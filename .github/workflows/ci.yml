name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: [8.5, 8.4, 8.3, 8.2]
        laravel: [13.*, 12.*]
        stability: [prefer-lowest, prefer-stable]
        os: [ubuntu-latest]
        include:
          - laravel: 13.*
            testbench: 11.*
          - laravel: 12.*
            testbench: 10.*
        exclude:
          - php: 8.2
            laravel: 13.*
          - php: 8.4
            stability: prefer-lowest
          - php: 8.5
            stability: prefer-lowest

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: >
            dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite,
            bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --dev --no-interaction --no-update

          # saloonphp/laravel-plugin does not yet have a stable release for Laravel 13
          # Use laravel-shift fork branch with inline alias to satisfy ^3.9 and minimum-stability:stable
          # see https://github.com/saloonphp/laravel-plugin/pull/77
          if [[ "${{ matrix.laravel }}" == "13.*" ]]; then
            composer config repositories.saloon-laravel-plugin vcs https://github.com/laravel-shift/laravel-plugin.git
            composer require \
              "saloonphp/laravel-plugin:dev-l13-compatibility as 3.9.2" \
              --dev --no-interaction --no-update
          fi

          composer update \
            --${{ matrix.stability }} \
            --prefer-dist --no-interaction

      - name: Run tests (no coverage)
        if: matrix.php != '8.4'
        run: vendor/bin/pest

      - name: Run tests with coverage (PHP 8.4 only)
        if: matrix.php == '8.4'
        run: vendor/bin/pest --coverage
